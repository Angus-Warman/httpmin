<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebSocket Echo</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, sans-serif;
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      font-size: 1.5rem;
    }

    #status {
      font-size: 0.85rem;
      padding: 4px 10px;
      border-radius: 4px;
      display: inline-block;
      margin-bottom: 12px;
    }

    #status.connected {
      background: #d4edda;
      color: #155724;
    }

    #status.disconnected {
      background: #f8d7da;
      color: #721c24;
    }

    #log {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      height: 300px;
      overflow-y: auto;
      padding: 10px;
      margin-bottom: 12px;
      font-size: 0.9rem;
    }

    #log div {
      margin-bottom: 4px;
    }

    #log .sent {
      color: #2563eb;
    }

    #log .received {
      color: #6b21a8;
    }

    #log .info {
      color: #6b7280;
      font-style: italic;
    }

    .row {
      display: flex;
      gap: 8px;
    }

    #input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.95rem;
    }

    #send {
      padding: 8px 20px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.95rem;
    }

    #send:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>

<body>
  <h1>WebSocket Echo</h1>
  <div id="status" class="disconnected">Disconnected</div>
  <div id="log"></div>
  <div class="row">
    <input id="input" type="text" placeholder="Type a message..." disabled autofocus>
    <button id="send" disabled>Send</button>
  </div>

  <script>
    const proto = location.protocol === "https:" ? "wss:" : "ws:"
    const ws = new WebSocket(proto + "//" + location.host + "/echo")

    const status = document.getElementById("status")
    const log = document.getElementById("log")
    const input = document.getElementById("input")
    const sendBtn = document.getElementById("send")

    function append(text, cls) {
      const el = document.createElement("div")
      el.className = cls
      el.textContent = text
      log.appendChild(el)
      log.scrollTop = log.scrollHeight
    }

    ws.onopen = () => {
      status.className = "connected"
      status.textContent = "Connected"
      input.disabled = false
      sendBtn.disabled = false
      input.focus()
      append("--- connected to server ---", "info")
    }

    ws.onclose = () => {
      status.className = "disconnected"
      status.textContent = "Disconnected"
      input.disabled = true
      sendBtn.disabled = true
      append("--- disconnected ---", "info")
    }

    ws.onmessage = (e) => append(e.data, "received")

    ws.onerror = () => append("connection error", "info")

    function send() {
      const msg = input.value.trim()
      if (!msg) return
      ws.send(msg)
      append("> " + msg, "sent")
      input.value = ""
      input.focus()
    }

    sendBtn.addEventListener("click", send)
    input.addEventListener("keydown", (e) => { if (e.key === "Enter") send() })
  </script>
</body>

</html>
